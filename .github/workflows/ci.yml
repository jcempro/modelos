name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache@v4
        with:
          path: |
            .cache/build
            .cache/eslint
            .cache/ts
            _site
          key: modelos-build-${{ runner.os }}-${{ hashFiles('package-lock.json', 'tsconfig.json', 'scripts/**/*.mjs', 'src/**/*.ts', 'src/**/*.tsx', '**/*.html', '**/*.css') }}
          restore-keys: |
            modelos-build-${{ runner.os }}-
      - run: npm ci
      - run: npm run check
      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site
          if-no-files-found: error
          retention-days: 14
