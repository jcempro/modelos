<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex"><title>404 · Ferramenta não encontrada</title><link rel="icon" href="/assets/brand/logo.svg" type="image/svg+xml"><link rel="stylesheet" href="/assets/css/documentos.css"></head><body class="jcem-dashboard jcem-error-page"><main class="jcem-error-panel"><p class="jcem-error-code">404</p><h1>Esta ferramenta não foi encontrada</h1><p>O endereço mudou ou não existe. Escolha um aplicativo para continuar.</p><div class="jcem-app-grid" data-app-grid aria-live="polite"></div><a class="jcem-home-link" href="/">Voltar ao workspace</a></main><script>(async()=>{const p=(location.pathname+location.search).replace(/^\/404\.html\/?/i,"/");if(!/\/[^/]*\.[^/]*$/.test(p)){try{const r=await fetch(p.replace(/\/?[^/]*\/?$/,"/")+"data.json");const j=await r.json();if(r.ok&&Array.isArray(j)&&j.length===1&&typeof j[0]==="string"){location.replace(new URL(j[0]).href);return}}catch{}}const g=document.querySelector("[data-app-grid]");try{const c=await fetch("/assets/config/apps.json").then(r=>r.json());g.innerHTML=c.apps.map(a=>`<a class="jcem-app-card" href="${a.href}"><span><strong>${a.title}</strong><small>${a.description}</small></span></a>`).join("")}catch{g.textContent="A lista de aplicativos está temporariamente indisponível."}})();</script></body></html>
